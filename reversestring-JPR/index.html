<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Reverser Pro | AI4Devs</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }

        input {
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary-color); }

        button {
            margin-top: 1rem;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        #result-container {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 6px;
            min-height: 1.2rem;
            word-break: break-all;
            text-align: center;
        }

        .label-result { font-size: 0.8rem; color: #64748b; margin-bottom: 0.2rem; display: block; }
        .success-text { font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

    <main class="card">
        <h1>String Reverser</h1>
        
        <div class="form-group">
            <input type="text" id="userInput" placeholder="Type something (e.g. AI4Devs)" aria-label="Text to reverse">
            <button id="reverseBtn">Invertir Texto</button>
        </div>

        <div id="result-container">
            <span class="label-result">Resultado:</span>
            <div id="resultOutput" class="success-text">---</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
