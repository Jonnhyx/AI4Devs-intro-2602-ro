<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Reverser | AI4Devs</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }

        h1 { font-size: 1.25rem; color: #1e293b; margin-bottom: 1.5rem; text-align: center; }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); }

        /* Estilos dinámicos para el botón */
        #actionBtn {
            margin-top: 1rem;
            width: 100%;
            padding: 0.8rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: all 0.3s ease; /* Transición suave */
        }

        #actionBtn.is-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .result-box {
            margin-top: 2rem;
            padding: 1.2rem;
            background: #f1f5f9;
            border-radius: 8px;
            min-height: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        #resultOutput { 
            font-size: 1.25rem; 
            font-weight: 700; 
            color: var(--primary); 
            word-break: break-all;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <main class="card">
        <h1>String Reverser <span id="charCount" style="font-size: 0.8rem; font-weight: normal;">(0)</span></h1>
        
        <input type="text" id="userInput" placeholder="Escribe más de 3 letras..." autocomplete="off">
        
        <button id="actionBtn">Copiar al portapapeles</button>

        <div class="result-box">
            <span class="result-label">Resultado en vivo:</span>
            <div id="resultOutput">---</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
